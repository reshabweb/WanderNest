version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: wandernest-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - wandernest-network

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: wandernest-backend
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - MONGODB_URI=mongodb://mongodb:27017/wandernest
      - SESSION_SECRET=my_wander_nest_super_secret_123
    depends_on:
      - mongodb
    networks:
      - wandernest-network
    volumes:
      - ./Backend/uploads:/usr/src/app/uploads

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: wandernest-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - wandernest-network

networks:
  wandernest-network:
    driver: bridge

volumes:
  mongo-data:
    driver: local
